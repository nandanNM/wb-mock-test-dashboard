name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
        env:
          VITE_API_BASE_URL: /api

      - name: Deploy dist/ to the VPS over rsync
        if: ${{ env.VPS_HOST != '' }}
        run: |
          set -euo pipefail
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$VPS_SSH_KEY"
          rsync -az --delete \
            -e "ssh -i $RUNNER_TEMP/deploy_key -p ${VPS_SSH_PORT:-22} -o StrictHostKeyChecking=accept-new" \
            dist/ "$VPS_USER@$VPS_HOST:/var/www/admin-dashboard/"
          rm -f "$RUNNER_TEMP/deploy_key"
