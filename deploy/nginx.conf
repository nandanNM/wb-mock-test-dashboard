# Hostinger VPS nginx site for the admin dashboard + backend API.
# Install on the box as /etc/nginx/sites-available/admin-dashboard, then:
#   ln -sf /etc/nginx/sites-available/admin-dashboard /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
# Then provision TLS (rewrites this file to add the 443 server + redirect):
#   certbot --nginx -d sparksspheresoftwares.cloud -d www.sparksspheresoftwares.cloud

server {
    listen 80;
    listen [::]:80;
    server_name sparksspheresoftwares.cloud www.sparksspheresoftwares.cloud;

    root /var/www/admin-dashboard;
    index index.html;

    # Backend API. The frontend builds with VITE_API_BASE_URL=/api, so a call to
    # /api/v1/... is proxied to the Go container as /v1/... (trailing slash on
    # proxy_pass strips the /api prefix). Adjust if your routes differ.
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache hashed Vite assets aggressively; they are content-addressed.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every other path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
